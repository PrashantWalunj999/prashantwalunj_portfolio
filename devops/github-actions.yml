# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions Workflow — Build & Push to Azure Container Registry
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#   ACR_LOGIN_SERVER    e.g.  myregistry.azurecr.io
#   ACR_USERNAME        Service principal / admin username
#   ACR_PASSWORD        Service principal / admin password
#   IMAGE_NAME          e.g.  prashantwalunj-portfolio
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Push to ACR

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  # ── Job 1: Build & Push ───────────────────────────────────────────────────
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=run_number,prefix=build-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test container
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull and run container
        run: |
          docker pull ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest
          docker run -d --name portfolio-test -p 5000:5000 \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest
          sleep 8

      - name: Verify HTTP 200 response
        run: |
          curl -sf http://localhost:5000 | grep -q "Prashant" \
            && echo "Smoke test passed" \
            || (echo "Smoke test FAILED" && exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f portfolio-test || true
